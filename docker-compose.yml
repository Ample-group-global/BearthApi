services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nft
      POSTGRES_PASSWORD: nft_secret
      POSTGRES_DB: nft_whitelist
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nft -d nft_whitelist"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
